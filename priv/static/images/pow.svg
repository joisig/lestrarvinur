<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- Comic-style POW burst effect -->
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Starburst background -->
  <polygon points="100,0 120,50 180,50 130,80 150,140 100,100 50,140 70,80 20,50 80,50" fill="#FFD700" stroke="#FFA500" stroke-width="3"/>
  <!-- Inner burst -->
  <polygon points="100,20 115,55 165,55 125,78 140,125 100,95 60,125 75,78 35,55 85,55" fill="#FFEC00" stroke="#FFB800" stroke-width="2"/>
  <!-- POW text -->
  <text x="100" y="85" font-family="Impact, Arial Black, sans-serif" font-size="42" font-weight="bold" fill="#FF0000" text-anchor="middle" filter="url(#shadow)">
    POW!
  </text>
  <!-- Text outline -->
  <text x="100" y="85" font-family="Impact, Arial Black, sans-serif" font-size="42" font-weight="bold" fill="none" stroke="#000" stroke-width="2" text-anchor="middle">
    POW!
  </text>
</svg>
